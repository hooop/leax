name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t leax .

      - name: Run tests
        run: docker run --rm --platform linux/amd64 --privileged leax python3 /app/test_gdb.py
